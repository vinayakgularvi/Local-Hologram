# Local Hologram — production-style stack (built SPA + FastAPI on one port).
#
# Usage:
#   docker compose up --build -d
#   open http://localhost:6064/holuminex/  (6064+ avoids browser X11 blocks on 6000–6063; / → redirects here)
#
# Optional: run Ollama in Compose and point the app at it:
#   docker compose --profile ollama up --build -d
#   Set in .env (or shell): OLLAMA_BASE=http://ollama:11434  (in-container; host maps 6065→11434)
#
# Env: copy variables you need into a `.env` file next to this file (Compose reads
# it for variable substitution). `env_file` below passes the same file into the container.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: local-hologram:latest
    ports:
      - "${WEB_PORT:-6064}:6064"
    environment:
      PORT: "6064"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:6064,http://127.0.0.1:6064,http://localhost:6066,http://127.0.0.1:6066,http://localhost:6067,http://127.0.0.1:6067}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/outputs:/app/backend/outputs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:6064/holuminex/api/health\", timeout=5).read()"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "${OLLAMA_HOST_PORT:-6065}:11434"
    restart: unless-stopped

volumes:
  ollama_models:
